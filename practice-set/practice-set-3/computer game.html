    <h1>Ball Ball Stump Game</h1>
    <button
      onclick="
        const userMessage = 'Bat';

        if (randomNumber >= 0 && randomNumber <= 1) {
          computerChoice = 'Bat';
          // console.log('computer chosed bat');
        } else if (randomNumber >= 1 && randomNumber <= 2) {
          computerChoice = 'Ball';
          // console.log('computer chosed ball');
        } else {
          computerChoice = 'Stump';
          // console.log('computer chosed stump');
        }

        const computerChoiceMsg = `${computerChoice}`;

        if (computerChoice === 'Ball') {
          resultMsg = 'User Won';
        } else if (computerChoice === 'Bat') {
          resultMsg = `It's a tie`;
        } else if (computerChoice === 'Stump') {
          resultMsg = 'Computer won';
        }

        alert(
          `You have chosen ${userMessage}. Computer choice is ${computerChoiceMsg} and ${resultMsg}`,
        );
      "

      Bat
    </button>
