<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="style.css" />
    <title>Practice Set 2</title>
  </head>
  <body>
    <button
      id="button-1"
      onclick="
        cartQuantity++;
        document.querySelector('#cart-summary').innerText =
          `Your bag has ${cartQuantity} Items`;
      "
    >
      Add to Bag
    </button>
    <button
      class="button"
      onclick="
        cartQuantity -= 1;
        document.querySelector('#cart-summary').innerText =
          `Your bag has ${cartQuantity} Items`;
      "
    >
      Move to Wishlist
    </button>
    <button
      class="button"
      onclick="
        cartQuantity += 2;
        document.querySelector('#cart-summary').innerText =
          `Your bag has ${cartQuantity} Items`;
      "
    >
      Add 1+1 Sale Item
    </button>
    <h1 id="cart-summary">Your bag has 0 Items</h1>
    <script src="./script.js"></script>
  </body>
</html>
