<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Document</title>
  </head>
  <body>
    <script>
      function isOdd(number) {
        let rem = number % 2;
        let isOdd = rem == 1;
        return isOdd;
      }

      console.log(isOdd(2));
      console.log(isOdd(5));
      console.log(isOdd(7));
      console.log(isOdd(4));
      console.log(isOdd(99));
    </script>
  </body>
</html>
